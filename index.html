<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Jogo de Rolar Dado</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            animation: fadeIn 0.5s ease-in;
        }

        .container:last-of-type {
            margin-top: 10px;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(-20px);
            }

            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            color: #333;
            margin-bottom: 30px;
            font-size: 2em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        #historico {
            width: 200px;
            height: 50px;
            font-size: 40px;
            border: 3px solid #e0e0e0;
            border-radius: 20px;
            margin: 20px auto;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
            text-align: right;
            overflow-x: auto;
            overflow-y: hidden;
            white-space: nowrap;
            padding-right: 10px;
        }

        #resultado {
            width: 200px;
            height: 200px;
            font-size: 120px;
            text-align: center;
            border: 3px solid #e0e0e0;
            border-radius: 20px;
            margin: 20px auto;
            display: block;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f8f9fa;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.1);
        }

        #resultado:hover,
        #historico:hover {
            transform: scale(1.05);
            border-color: #667eea;
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.3);
        }

        button {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 15px 40px;
            font-size: 18px;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.2);
            font-weight: bold;
            margin-top: 20px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(102, 126, 234, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        a {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            background: white;
            color: #667eea;
            text-decoration: none;
            border-radius: 50px;
            font-weight: 600;
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            border: 2px solid #e0e0e0;
            margin: 5px;
        }

        a:hover {
            border-color: #667eea;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(102, 126, 234, 0.2);
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
    </style>
</head>

<body>
    <div class="container">
        <div class="container">
            <a href="descubraPalavra.html">Descubra a palavra</a>
            <h1>Jogo: Rolar dados</h1>
            <input type="text" id="resultado">
            <button onclick="rolar()">Rolar Dado</button>
        </div>
        <div class="container">
            <input type="text" id="historico">
        </div>
    </div>

    <script>

        function corRGBAleatoria() {
            const r = Math.floor(Math.random() * 256);
            const g = Math.floor(Math.random() * 256);
            const b = Math.floor(Math.random() * 256);
            return `rgb(${r}, ${g}, ${b})`;
        }

        function rolar() {
            var resultado = document.getElementById('resultado')
            var historico = document.getElementById('historico')
            var dadoRolado = Math.floor(Math.random() * 6) + 1

            switch (dadoRolado) {
                case 1:
                    resultado.value = "⚀"
                    historico.value += "⚀" + ", "
                    document.getElementById('historico').style.color = corRGBAleatoria();
                    document.getElementById('resultado').style.color = corRGBAleatoria();
                    historico.scrollLeft = historico.scrollWidth;
                    break; ''
                case 2:
                    resultado.value = "⚁"
                    historico.value += "⚁" + ", "
                    document.getElementById('historico').style.color = corRGBAleatoria();
                    document.getElementById('resultado').style.color = corRGBAleatoria();
                    historico.scrollLeft = historico.scrollWidth;
                    break;
                case 3:
                    resultado.value = "⚂"
                    historico.value += "⚂" + ", "
                    document.getElementById('historico').style.color = corRGBAleatoria();
                    document.getElementById('resultado').style.color = corRGBAleatoria();
                    historico.scrollLeft = historico.scrollWidth;
                    break;
                case 4:
                    resultado.value = "⚃"
                    historico.value += "⚃" + ", "
                    document.getElementById('historico').style.color = corRGBAleatoria();
                    document.getElementById('resultado').style.color = corRGBAleatoria();
                    historico.scrollLeft = historico.scrollWidth;
                    break;
                case 5:
                    resultado.value = "⚄"
                    historico.value += "⚄" + ", "
                    document.getElementById('historico').style.color = corRGBAleatoria();
                    document.getElementById('resultado').style.color = corRGBAleatoria();
                    historico.scrollLeft = historico.scrollWidth;
                    break;
                case 6:
                    resultado.value = "⚅"
                    historico.value += "⚅" + ", "
                    document.getElementById('historico').style.color = corRGBAleatoria();
                    document.getElementById('resultado').style.color = corRGBAleatoria();
                    historico.scrollLeft = historico.scrollWidth;
                    break;
                default:
                    resultado.value = "Tente Novamente"
            }
            console.log(dadoRolado)

    </script>
</body>

</html>
